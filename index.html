<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hattrick Team Spirit Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>HT Team Spirit Simulator</h1>
    
    <div class="panel">
        <div class="settings-grid">
            <div class="form-group">
                <label for="coachLeadership">Coach Leadership (1-7)</label>
                <input type="number" id="coachLeadership" min="1" max="7" value="6">
            </div>
            <div class="form-group">
                <label for="psychologistLevel">Psychologist Level (0-5)</label>
                <input type="number" id="psychologistLevel" min="0" max="5" value="0">
            </div>
            <div class="form-group">
                <label for="baseMidfieldRating">Base Midfield Rating</label>
                <input type="number" id="baseMidfieldRating" step="0.1" value="10.0">
            </div>
            <div class="form-group">
                <label for="tsCalculationMethod">TS Algorithm</label>
                <select id="tsCalculationMethod" class="select-control">
                    <option value="piecewise">Default (Piecewise)</option>
                    <option value="asymptotic">Asymptotic (HO - Imprecise)</option>
                </select>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="isNationalTeam">
                <label for="isNationalTeam" style="margin:0;">National Team</label>
            </div>
            <div class="form-group">
                <button id="btnReset" class="btn-reset">Reset Season</button>
            </div>
            <div class="form-group">
                <button id="btnThemeToggle" class="btn-reset btn-theme">🌙 Dark Mode</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <table>
            <thead>
                <tr>
                    <th>Wk</th>
                    <th>Day</th>
                    <th>Type</th>
                    <th>Played</th>
                    <th>Venue</th>
                    <th>Tactic</th>
                    <th>Attitude</th>
                    <th>Pre-Match TS</th>
                    <th>Midfield</th>
                    <th>Post-Match TS</th>
                </tr>
            </thead>
            <tbody id="scheduleTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
